<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Car Wash</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-wrapper">
    <main class="login-container">
        <div class="text-center">
            <h2>Create Account</h2>
            <p class="text-muted">Join the Car Wash community today</p>
        </div>

        <div id="auth-feedback"></div>

        <form id="register-form" class="mt-1">
            <div class="form-group">
                <label for="reg-username">Full Name</label>
                <input type="text" id="reg-username" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label for="reg-email">Email Address</label>
                <input type="email" id="reg-email" placeholder="example@mail.com" required>
            </div>
            
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="Min. 8 characters" minlength="8" required>
            </div>

            <button type="submit" class="btn-primary mt-1">Register</button>
        </form>

        <div class="mt-2 text-center">
            <p>Already have an account? <a href="index.html">Login here</a></p>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
