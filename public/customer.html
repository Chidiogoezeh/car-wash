<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <strong>Sparkle Wash</strong>
        <div>
            <span id="user-display"></span>
            <button id="logout-btn" class="btn-danger">Logout</button>
        </div>
    </nav>
    <div class="container">
        <section class="card mb-2">
            <h3>Book a Service</h3>
            <form id="booking-form" class="grid-3 mt-1">
                <div class="form-group">
                    <label>Wash Type</label>
                    <select id="service-select" required></select>
                </div>
                <div class="form-group">
                    <label>Slot</label>
                    <select id="slot-select" required></select>
                </div>
                <div class="form-group">
                    <label>Plate Number</label>
                    <input type="text" id="plate-number" placeholder="e.g. LAG-123" required>
                </div>
                <button type="submit" class="btn-success">Confirm Booking</button>
            </form>
        </section>
        <h3>Service Status</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Plate</th>
                        <th>Service</th>
                        <th>Status</th>
                        <th>Notification / Payment</th>
                    </tr>
                </thead>
                <tbody id="order-history"></tbody>
            </table>
        </div>
        <div class="footer-actions mt-3">
            <button id="delete-account-btn" class="btn-outline-danger">Request Account Deletion</button>
            <p class="text-muted text-xs mt-1">Accounts are permanently wiped 30 days after deletion request.</p>
        </div>
    </div>
    <script src="js/dashboard.js"></script>
</body>
</html>
