<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-wrapper">
    <main class="login-container text-center">
        <h1>Welcome back</h1>
        <p class="mb-2">Please login to your account</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary">Login</button>
        </form>

        <div class="mt-1">
            <p>New user? <a href="register.html">Create an account</a></p>
        </div>

        <div class="mt-2">
            <button id="staff-toggle-btn" class="btn-small btn-toggle">Staff Access</button>
        </div>
    </main>

    <script src="js/authUi.js"></script>
</body>
</html>
