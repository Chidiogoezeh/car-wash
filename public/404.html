<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Car Wash</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-wrapper">
    <main class="card text-center fade-in">
        <div class="error-container">
            <h1 class="error-code">404</h1>
            <h2 class="error-title mt-1">Lost in the Suds?</h2>
            <p class="text-muted mt-1">
                The page you are looking for doesn't exist or has been moved.
            </p>
            
            <div class="mt-2">
                <a href="index.html" class="btn-primary w-100">Return to Login</a>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log("User encountered a 404 error.");
        });
    </script>
</body>
</html>
