<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <strong>Admin Portal</strong>
        <div>
            <span id="user-display"></span>
            <button id="logout-btn" class="btn-danger btn-small">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard-toggles mb-2">
            <button id="toggle-wash" class="btn-toggle active">Wash Types</button>
            <button id="toggle-staff" class="btn-toggle">Staff Management</button>
            <button id="toggle-activity" class="btn-toggle">Daily Activity</button>
        </div>

        <div id="admin-error-container"></div>

        <section id="section-wash" class="card">
            <h4>Manage Services</h4>
            <p class="text-muted mb-1">Add or update types of washes available to customers.</p>
            
            <form id="service-form" class="mt-1">
                <div class="grid-2">
                    <div class="form-group">
                        <label for="svc-name">Service Name</label>
                        <input type="text" id="svc-name" placeholder="e.g. Executive Interior" required>
                    </div>
                    <div class="form-group">
                        <label for="svc-price">Price (₦)</label>
                        <input type="number" id="svc-price" placeholder="5000" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Add Service</button>
            </form>

            <div class="mt-2">
                <h5>Current Services</h5>
                <div id="services-list-container" class="mt-1">
                    </div>
            </div>
        </section>

        <section id="section-staff" class="card hidden">
            <h4>Register New Attendant</h4>
            <p class="text-muted mb-1">Create accounts for car wash staff members.</p>
            
            <form id="attendant-form" class="mt-1">
                <div class="form-group">
                    <label for="att-name">Full Name</label>
                    <input type="text" id="att-name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="att-email">Email Address</label>
                    <input type="email" id="att-email" placeholder="staff@carwash.com" required>
                </div>
                <div class="form-group">
                    <label for="att-password">Temporary Password</label>
                    <input type="password" id="att-password" placeholder="Min 8 characters" required>
                </div>
                <button type="submit" class="btn-primary">Generate Staff Account</button>
            </form>
        </section>

        <section id="section-activity" class="hidden">
            <div class="card">
                <h3>Operations Log</h3>
                <input type="date" id="activity-date-filter">
            </div>

            <div class="table-container mt-1">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Action</th>
                            <th>IP Address</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="daily-activity-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
